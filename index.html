<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>【デモ:即消えver】クイズ○×ラッシュ!</title>
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-title" content="クイズ○×ラッシュ">
<link rel="icon" type="image/png" sizes="32x32" href="icon/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icon/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #ffffff;
    --maru: #17a974;
    --maru-dark: #128a5e;
    --batsu: #e14a56;
    --batsu-dark: #c8404f;
    --cream: #f7f5ee;
    --gold: #cc7a00;
    --ink: #14152a;
    --chip-bg: rgba(20,21,42,.82);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; height:100%; overflow:hidden;
    background:var(--bg);
    font-family:'Zen Maru Gothic', -apple-system, 'Hiragino Sans', sans-serif;
    color:var(--ink);
    touch-action:none;
    user-select:none;
  }
  .num{font-family:'Fredoka', 'Zen Maru Gothic', sans-serif;}

  #app{position:relative; width:100vw; height:100vh; height:100dvh;}
  .screen{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px;
    opacity:1; transition:opacity .35s ease;
    background:var(--bg);
    overflow:hidden;
  }
  .screen.hidden{opacity:0; pointer-events:none;}
  #end-screen, #start-screen{
    overflow-y:auto; -webkit-overflow-scrolling:touch;
    /* 画面が低い端末でコンテンツが縦に収まりきらないとき、
       中央寄せのままだと上側(タイトルなど)が見切れてスクロールでも届かなくなるための対策。
       safeキーワード対応ブラウザでは、はみ出す場合は上端(start側)から詰めて表示される。 */
    justify-content:safe center;
    padding-top:max(24px, env(safe-area-inset-top));
    padding-bottom:max(24px, env(safe-area-inset-bottom));
  }

  /* ---------- START SCREEN ---------- */
  #start-screen{gap:28px; background:
    radial-gradient(circle at 25% 20%, rgba(61,220,151,.20), transparent 45%),
    radial-gradient(circle at 78% 75%, rgba(255,107,122,.20), transparent 45%),
    var(--bg);
  }
  .logo-wrap{display:flex; align-items:center; gap:10px;}
  .logo-symbol{
    font-family:'Fredoka'; font-weight:700; font-size:52px; line-height:1;
    width:76px; height:76px; border-radius:22px;
    display:flex; align-items:center; justify-content:center;
  }
  .logo-symbol.o{background:var(--maru); color:#fff; transform:rotate(-6deg);}
  .logo-symbol.x{background:var(--batsu); color:#fff; transform:rotate(6deg);}
  h1{font-size:26px; margin:0; text-align:center; letter-spacing:.02em;}
  .subtitle{opacity:.7; font-size:13px; margin-top:-16px; text-align:center;}

  .howto{
    display:flex; flex-direction:column; gap:10px;
    background:rgba(20,21,42,.045); border:1px solid rgba(20,21,42,.09);
    border-radius:18px; padding:16px 20px; width:min(320px, 82vw);
  }
  .howto-row{display:flex; align-items:center; gap:12px; font-size:13.5px;}
  .howto-badge{
    font-family:'Fredoka'; font-weight:700; font-size:18px; flex-shrink:0;
    width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center;
  }
  .howto-badge.left{background:var(--maru); color:#fff;}
  .howto-badge.right{background:var(--batsu); color:#fff;}

  .time-select{display:flex; gap:10px;}
  .time-btn{
    font-family:'Fredoka'; font-weight:700; font-size:15px;
    padding:10px 22px; border-radius:14px; border:2px solid rgba(20,21,42,.18);
    background:transparent; color:var(--ink); cursor:pointer;
  }
  .time-btn.active{background:var(--gold); color:#fff; border-color:var(--gold);}

  .section-label{font-size:12px; font-weight:700; opacity:.5; margin-top:-8px;}
  .genre-select{
    display:flex; flex-wrap:wrap; gap:8px; justify-content:center;
    width:min(320px, 84vw);
  }
  .genre-btn{
    font-family:'Zen Maru Gothic'; font-weight:700; font-size:12.5px;
    padding:8px 13px; border-radius:999px; border:2px solid rgba(20,21,42,.15);
    background:transparent; color:var(--ink); cursor:pointer;
  }
  .genre-btn.active{background:var(--maru); color:#fff; border-color:var(--maru);}

  .start-btn{
    font-family:'Fredoka'; font-weight:700; font-size:19px;
    padding:15px 46px; border-radius:999px; border:none;
    background:var(--gold); color:#fff; cursor:pointer;
    box-shadow:0 6px 0 #965c00;
  }
  .start-btn:active{transform:translateY(4px); box-shadow:0 2px 0 #965c00;}

  /* 画面の高さが低い端末(iPhone 12 mini等)ではスタート画面の余白・ロゴを詰めて、
     スクロールしなくてもタイトルからスタートボタンまで収まりやすくする */
  @media (max-height:700px){
    #start-screen{gap:16px; padding-top:16px; padding-bottom:16px;}
    .logo-symbol{width:56px; height:56px; font-size:38px; border-radius:16px;}
    h1{font-size:22px;}
    .subtitle{margin-top:-8px;}
    .howto{padding:12px 18px; gap:6px;}
  }

  /* ---------- GAME SCREEN ---------- */
  #game-screen{padding:0;}
  .zone{
    position:absolute; top:0; bottom:0; width:50%;
    transition:background-color .12s ease;
  }
  .zone-left{left:0; background:transparent;}
  .zone-right{right:0; background:transparent;}
  .zone-symbol{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    font-family:'Fredoka'; font-weight:700; font-size:15vh; opacity:.16;
  }
  .zone-left .zone-symbol{color:var(--maru);}
  .zone-right .zone-symbol{color:var(--batsu);}

  .hud{
    position:absolute; top:0; left:0; right:0; z-index:5;
    padding:16px 18px 0; display:flex; flex-direction:column; gap:10px;
  }
  .hud-top{display:flex; justify-content:space-between; align-items:center;}
  .hud-left{display:flex; align-items:center; gap:8px;}
  .quit-btn{
    width:32px; height:32px; border-radius:50%; flex-shrink:0;
    background:var(--chip-bg); border:1px solid rgba(255,255,255,.14);
    color:#fff; font-size:13px; font-weight:700; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(6px);
  }
  .hud-right{display:flex; align-items:center; gap:8px;}
  .history-btn{
    font-family:'Zen Maru Gothic'; font-weight:700; font-size:13px;
    background:var(--chip-bg); border:1px solid rgba(255,255,255,.14);
    padding:8px 14px; border-radius:999px; backdrop-filter:blur(6px);
    color:#fff; cursor:pointer;
  }
  .top-history-btn{
    position:absolute; top:18px; right:18px;
    font-family:'Zen Maru Gothic'; font-weight:700; font-size:13px;
    background:var(--chip-bg); border:1px solid rgba(255,255,255,.14);
    padding:8px 14px; border-radius:999px; backdrop-filter:blur(6px);
    color:#fff; cursor:pointer;
  }
  .score-pill{
    font-family:'Fredoka'; font-weight:700; font-size:15px;
    background:var(--chip-bg); border:1px solid rgba(255,255,255,.14);
    padding:7px 16px; border-radius:999px; backdrop-filter:blur(6px);
    color:#fff;
  }
  .score-pill .n{color:#ffcb4d; font-size:18px;}
  .timer-track{height:11px; border-radius:999px; background:rgba(20,21,42,.12); overflow:hidden;}
  .timer-fill{height:100%; width:100%; background:var(--gold); border-radius:999px; transition:width .2s linear, background-color .3s;}
  .timer-fill.warn{background:linear-gradient(90deg,#ffb23d,#ff8a3d);}
  .timer-fill.danger{background:var(--batsu); animation:fillPulse .5s ease-in-out infinite;}
  @keyframes fillPulse{
    0%,100%{opacity:1;}
    50%{opacity:.5;}
  }

  /* カードのすぐ上に置く、大きく視認しやすいタイマー数字。
     問題文を読んでいる視線のすぐそばに配置することで、
     上部HUDまで目を動かさなくても残り時間を意識できるようにしている */
  .card-timer-wrap{
    display:flex; flex-direction:column; align-items:center; gap:34px;
  }
  .card-timer{
    display:flex; align-items:baseline; gap:5px;
    font-family:'Fredoka'; font-weight:700;
    color:var(--ink); line-height:1;
    transition:color .2s;
  }
  .card-timer .card-timer-n{font-size:clamp(56px, 18vw, 84px);}
  .card-timer .card-timer-unit{
    font-family:'Zen Maru Gothic'; font-weight:900; font-size:16px;
    opacity:.5; padding-bottom:10px;
  }
  .card-timer.warn{color:var(--gold);}
  .card-timer.danger{color:var(--batsu); animation:cardTimerPulse .5s ease-in-out infinite;}
  @keyframes cardTimerPulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.14);}
  }
  #danger-vignette{
    position:absolute; inset:0; z-index:4; pointer-events:none;
    box-shadow:inset 0 0 70px 12px rgba(225,74,86,.6);
    opacity:0; transition:opacity .3s;
  }
  #danger-vignette.active{
    opacity:1; animation:vignettePulse .8s ease-in-out infinite;
  }
  @keyframes vignettePulse{
    0%,100%{opacity:.45;}
    50%{opacity:.95;}
  }

  /* persistent left/right guide */
  .side-hint{
    position:absolute; left:0; right:0; bottom:0; z-index:5;
    display:flex; justify-content:space-between;
    padding:0 16px calc(18px + env(safe-area-inset-bottom, 0px));
    pointer-events:none;
  }
  .hint-pill{
    font-family:'Fredoka'; font-weight:700; font-size:14px;
    display:flex; align-items:center; gap:6px;
    padding:9px 16px; border-radius:999px;
    background:var(--chip-bg); border:1px solid rgba(255,255,255,.14);
    backdrop-filter:blur(6px);
    color:#fff;
    pointer-events:auto; cursor:pointer;
    transition:transform .1s ease;
  }
  .hint-pill:active{transform:scale(.94);}
  .hint-pill .sym{font-size:17px;}
  .hint-pill.hint-o .sym{color:#5eebb0;}
  .hint-pill.hint-x .sym{color:#ff9aa2;}

  .card-wrap{
    position:absolute; inset:0; z-index:4;
    display:flex; align-items:center; justify-content:center;
    padding:0 26px;
  }
  .card{
    width:min(320px, 100%); min-height:180px;
    background:var(--cream); color:var(--ink);
    border-radius:24px; padding:26px 24px;
    display:flex; align-items:center; justify-content:center; text-align:center;
    font-size:19px; font-weight:700; line-height:1.55;
    box-shadow:0 14px 34px rgba(20,21,42,.16);
    border:1px solid rgba(20,21,42,.06);
    cursor:grab; touch-action:none;
  }
  .card.dragging{cursor:grabbing;}
  .card .qnum{
    position:absolute; top:14px; left:18px; font-family:'Fredoka'; font-size:12px; opacity:.4; font-weight:700;
  }

  .flash{
    position:absolute; inset:0; z-index:6; pointer-events:none;
    display:flex; align-items:center; justify-content:center;
    opacity:0;
  }
  .flash-text{
    font-family:'Fredoka'; font-weight:700; font-size:34px;
    padding:14px 30px; border-radius:20px; color:var(--ink);
  }
  .flash-text.correct{background:var(--maru); color:#fff; animation:pop-in .32s cubic-bezier(.3,1.5,.4,1);}
  .flash-text.wrong{background:var(--batsu); color:#fff; animation:pop-in .32s cubic-bezier(.3,1.5,.4,1);}
  @keyframes pop-in{
    0%{ transform:scale(.4); }
    60%{ transform:scale(1.15); }
    100%{ transform:scale(1); }
  }

  /* ---------- 不正解:瞬間フラッシュ+シェイク ---------- */
  .wrong-flash{
    position:absolute; inset:0; z-index:8;
    pointer-events:none; background:var(--batsu); opacity:0;
  }
  .wrong-flash.active{ animation:wrong-flash-anim .4s ease-out; }
  @keyframes wrong-flash-anim{
    0%{ opacity:.6; }
    100%{ opacity:0; }
  }
  .card-wrap.shake{ animation:shake-anim .35s ease; }
  @keyframes shake-anim{
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-14px); }
    40%{ transform:translateX(11px); }
    60%{ transform:translateX(-8px); }
    80%{ transform:translateX(5px); }
  }

  /* ---------- カウントダウン ---------- */
  .countdown-overlay{
    position:absolute; inset:0; z-index:9;
    background:rgba(255,255,255,.92);
    display:flex; align-items:center; justify-content:center;
    transition:opacity .25s ease;
  }
  .countdown-overlay.hidden{ opacity:0; pointer-events:none; }
  .countdown-num{
    font-family:'Fredoka'; font-weight:700; color:var(--ink);
    font-size:96px; line-height:1;
  }
  .countdown-num.go{ color:var(--maru); font-size:52px; }
  .countdown-num.pop{ animation:countdown-pop .55s cubic-bezier(.2,1.4,.4,1); }
  @keyframes countdown-pop{
    0%{ transform:scale(.3); opacity:0; }
    45%{ transform:scale(1.15); opacity:1; }
    100%{ transform:scale(1); opacity:1; }
  }

  /* ---------- CONFETTI (正解エフェクト) ---------- */
  .confetti-layer{
    position:absolute; inset:0; z-index:7;
    pointer-events:none; overflow:hidden;
  }
  .confetti-piece{
    position:absolute; top:50%; left:50%;
    width:8px; height:8px;
    opacity:0;
    animation:confetti-burst 1.05s cubic-bezier(.15,.7,.3,1) forwards;
  }
  @keyframes confetti-burst{
    0%{ transform:translate(-50%,-50%) rotate(0deg) scale(.3); opacity:1; }
    12%{ transform:translate(-50%,-50%) rotate(calc(var(--rot) * 0.2)) scale(1.3); opacity:1; }
    100%{ transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(var(--rot)) scale(.5); opacity:0; }
  }

  /* ---------- END SCREEN ---------- */
  #end-screen{gap:18px;}
  .result-label{font-size:14px; opacity:.5; letter-spacing:.08em;}
  .interrupted-tag{
    font-family:'Zen Maru Gothic'; font-weight:700; font-size:11px; letter-spacing:0;
    background:rgba(225,74,86,.12); color:var(--batsu);
    padding:3px 9px; border-radius:999px; margin-left:4px; opacity:1;
  }
  .interrupted-tag.hidden{display:none;}
  .result-score{font-family:'Fredoka'; font-weight:700; font-size:76px; color:var(--gold); line-height:1;}
  .result-sub{font-size:14px; opacity:.6;}
  .result-tier{
    font-size:15px; font-weight:700; background:rgba(20,21,42,.05);
    border:1px solid rgba(20,21,42,.1); padding:8px 20px; border-radius:999px;
  }
  .retry-btn{
    margin-top:8px; font-family:'Fredoka'; font-weight:700; font-size:17px;
    padding:13px 40px; border-radius:999px; border:none;
    background:var(--ink); color:#fff; cursor:pointer;
    box-shadow:0 6px 0 #000;
  }
  .retry-btn:active{transform:translateY(4px); box-shadow:0 2px 0 #000;}

  .result-stats{
    display:flex; gap:10px; margin-top:4px;
  }
  .stat{
    display:flex; flex-direction:column; align-items:center; gap:2px;
    background:rgba(20,21,42,.04); border:1px solid rgba(20,21,42,.09);
    border-radius:14px; padding:10px 16px; min-width:78px;
  }
  .stat-label{font-size:11px; opacity:.6; font-weight:700;}
  .stat-val{font-family:'Fredoka'; font-weight:700; font-size:20px;}
  .stat-val.ok{color:var(--maru);}
  .stat-val.ng{color:var(--batsu);}

  .rank-row{display:flex; gap:14px; margin-top:6px;}
  .rank-card{
    display:flex; flex-direction:column; align-items:center; gap:6px;
    background:rgba(20,21,42,.04); border:1px solid rgba(20,21,42,.09);
    border-radius:16px; padding:12px 22px; min-width:110px;
  }
  .rank-label{font-size:12px; opacity:.65; font-weight:700;}
  .rank-grade{
    font-family:'Fredoka'; font-weight:700; font-size:28px; line-height:1;
  }
  .rank-grade.grade-D{color:#aeb3c2;}
  .rank-grade.grade-C{color:#8b91a8;}
  .rank-grade.grade-B{color:#6f93ad;}
  .rank-grade.grade-A{color:#3f9e8f;}
  .rank-grade.grade-S{color:var(--maru);}
  .rank-grade.grade-SS{color:var(--gold);}
  .rank-grade.grade-SSS{color:#e0562e;}
  .rank-grade.grade-EX{color:#c8323e;}
  .rank-grade.grade-MASTER{
    background:linear-gradient(90deg,#cc7a00,#e0562e);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .rank-grade.grade-LEGEND{
    background:linear-gradient(90deg,#4d9eff,#b06bff,#e14a56,#ffcb4d);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .rank-grade.grade-none{color:#c3c7d4;}

  .end-history-link{
    background:none; border:none; color:var(--ink); opacity:.55;
    font-family:'Zen Maru Gothic'; font-size:13px; text-decoration:underline;
    cursor:pointer; margin-top:2px;
  }

  /* ---------- HISTORY MODAL ---------- */
  .modal-overlay{
    position:fixed; inset:0; z-index:30;
    background:rgba(10,10,20,.62);
    display:flex; align-items:center; justify-content:center;
    padding:24px;
    opacity:1; transition:opacity .25s ease;
  }
  .modal-overlay.hidden{opacity:0; pointer-events:none;}
  #clear-history-modal{ z-index:40; }
  .modal-card{
    width:min(360px, 100%); max-height:74vh;
    background:var(--cream); color:var(--ink);
    border-radius:22px; padding:18px 18px 8px;
    display:flex; flex-direction:column;
    box-shadow:0 20px 50px rgba(0,0,0,.4);
  }
  .modal-header{
    display:flex; justify-content:space-between; align-items:center;
    font-weight:700; font-size:15px; padding-bottom:12px;
    border-bottom:1px solid rgba(20,21,42,.1); margin-bottom:8px; flex-shrink:0;
  }
  .modal-header-left{display:flex; align-items:center; gap:8px;}
  .modal-back{
    background:rgba(20,21,42,.08); border:none; width:28px; height:28px;
    border-radius:50%; font-size:14px; font-weight:700; color:var(--ink);
    cursor:pointer; line-height:1; display:flex; align-items:center; justify-content:center;
  }
  .modal-back.hidden{display:none;}
  .modal-close{
    background:rgba(20,21,42,.08); border:none; width:28px; height:28px;
    border-radius:50%; font-size:15px; font-weight:700; color:var(--ink);
    cursor:pointer; line-height:1;
  }
  .modal-list{overflow-y:auto; display:flex; flex-direction:column; padding-bottom:10px;}
  .modal-empty{opacity:.5; font-size:13px; text-align:center; padding:30px 0;}
  .g-item{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:12px 4px; border-bottom:1px solid rgba(20,21,42,.08);
    cursor:pointer; background:none; border-left:none; border-right:none; border-top:none;
    width:100%; text-align:left; font-family:'Zen Maru Gothic';
  }
  .g-item-left{display:flex; flex-direction:column; gap:2px;}
  .g-item-date{font-size:11px; opacity:.55;}
  .g-interrupted{
    font-family:'Zen Maru Gothic'; font-weight:700; font-size:10px;
    background:rgba(225,74,86,.12); color:var(--batsu);
    padding:2px 7px; border-radius:999px; margin-left:5px;
  }
  .g-item-score{font-size:14px; font-weight:700; color:var(--ink);}
  .g-item-right{display:flex; align-items:center; gap:8px;}
  .g-item-rate{font-family:'Fredoka'; font-weight:700; font-size:15px; opacity:.75;}
  .g-item-arrow{opacity:.35; font-size:14px;}
  .clear-history-btn{
    width:100%; margin-top:10px; padding:12px 0;
    background:none; border:none; border-top:1px solid rgba(20,21,42,.08);
    color:var(--batsu); font-family:'Zen Maru Gothic'; font-weight:700; font-size:13px;
    cursor:pointer;
  }
  .g-item-grades{display:flex; gap:4px; margin-top:2px;}
  .g-grade{
    font-family:'Fredoka'; font-weight:700; font-size:11px;
    padding:3px 7px; border-radius:999px; background:rgba(20,21,42,.07);
  }
  .g-grade.grade-D{color:#aeb3c2;}
  .g-grade.grade-C{color:#8b91a8;}
  .g-grade.grade-B{color:#6f93ad;}
  .g-grade.grade-A{color:#3f9e8f;}
  .g-grade.grade-S{color:var(--maru);}
  .g-grade.grade-SS{color:var(--gold);}
  .g-grade.grade-SSS{color:#e0562e;}
  .g-grade.grade-EX{color:#c8323e;}
  .g-grade.grade-MASTER{color:#a8590a;}
  .g-grade.grade-LEGEND{color:#8455d1;}
  .g-grade.grade-none{color:#a3a8b8;}
  .h-item{
    display:flex; align-items:flex-start; gap:10px;
    padding:12px 2px; border-bottom:1px solid rgba(20,21,42,.08);
  }
  .h-num{font-family:'Fredoka'; font-weight:700; font-size:12px; opacity:.4; flex-shrink:0; width:26px; padding-top:7px;}
  .h-q{flex:1; font-size:13px; line-height:1.5; font-weight:500; padding-top:5px;}
  .h-mark{
    font-family:'Fredoka'; font-weight:700; font-size:14px; flex-shrink:0;
    width:32px; height:32px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
  }
  .h-mark.ok{background:var(--maru); color:#fff;}
  .h-mark.ng{background:var(--batsu); color:#fff;}
  .h-correct-note{font-size:11px; opacity:.55; margin-top:3px;}
  .h-exp{
    font-size:12px; color:var(--ink); opacity:.8; line-height:1.5;
    margin-top:5px; padding:8px 10px; border-radius:10px;
    background:rgba(204,122,0,.08);
  }

  /* ---------- QUIT CONFIRM ---------- */
  .confirm-card{align-items:center; text-align:center; gap:18px; padding:26px 22px;}
  .confirm-text{font-size:15px; font-weight:700; line-height:1.6;}
  .confirm-sub{font-size:12px; font-weight:500; opacity:.55;}
  .confirm-actions{display:flex; gap:10px; width:100%;}
  .confirm-btn{
    flex:1; font-family:'Zen Maru Gothic'; font-weight:700; font-size:14px;
    padding:12px 0; border-radius:999px; border:none; cursor:pointer;
  }
  .confirm-btn.ghost{background:rgba(20,21,42,.07); color:var(--ink);}
  .confirm-btn.danger{background:var(--batsu); color:#fff;}
</style>
</head>
<body>

<div id="app">

  <!-- START -->
  <div id="start-screen" class="screen">
    <button class="top-history-btn" id="top-history-btn">履歴</button>
    <div class="logo-wrap">
      <div class="logo-symbol o">○</div>
      <div class="logo-symbol x">×</div>
    </div>
    <h1>クイズ○×ラッシュ!</h1>
    <div class="subtitle">制限時間内に何問正解できるかな?</div>

    <div class="howto">
      <div class="howto-row"><div class="howto-badge left">←</div>左にフリックで「○(正しい)」</div>
      <div class="howto-row"><div class="howto-badge right">→</div>右にフリックで「×(間違い)」</div>
    </div>

    <div class="time-select" id="time-select">
      <button class="time-btn" data-t="30">30秒</button>
      <button class="time-btn active" data-t="60">60秒</button>
      <button class="time-btn" data-t="90">90秒</button>
    </div>

    <div class="section-label">ジャンル</div>
    <div class="genre-select" id="genre-select">
      <button class="genre-btn active" data-g="all">ミックス(全部)</button>
      <button class="genre-btn" data-g="動物">動物</button>
      <button class="genre-btn" data-g="歴史">歴史</button>
      <button class="genre-btn" data-g="食べ物">食べ物</button>
      <button class="genre-btn" data-g="スポーツ">スポーツ</button>
      <button class="genre-btn" data-g="ことば">ことば</button>
      <button class="genre-btn" data-g="雑学">雑学</button>
      <button class="genre-btn" data-g="アニメ">アニメ</button>
      <button class="genre-btn" data-g="映画">映画</button>
      <button class="genre-btn" data-g="音楽">音楽</button>
    </div>

    <button class="start-btn" id="start-btn">スタート</button>
  </div>

  <!-- GAME -->
  <div id="game-screen" class="screen hidden">
    <div class="zone zone-left" id="zone-left"><div class="zone-symbol">○</div></div>
    <div class="zone zone-right" id="zone-right"><div class="zone-symbol">×</div></div>

    <div id="danger-vignette"></div>

    <div class="hud">
      <div class="hud-top">
        <div class="hud-left">
          <button class="quit-btn" id="quit-btn" aria-label="中断">✕</button>
          <div class="score-pill">正解 <span class="n num" id="score-num">0</span></div>
        </div>
        <div class="hud-right">
          <button class="history-btn" id="history-btn">履歴</button>
        </div>
      </div>
      <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>
    </div>

    <div class="card-wrap" id="card-wrap">
      <div class="card-timer-wrap">
        <div class="card-timer num" id="timer-num">
          <span class="card-timer-n" id="timer-num-n">60</span><span class="card-timer-unit">秒</span>
        </div>
        <div class="card" id="card">
          <span class="qnum num" id="qnum">Q1</span>
          <span id="qtext">問題文</span>
        </div>
      </div>
    </div>

    <div class="side-hint">
      <div class="hint-pill hint-o" id="hint-o-btn"><span class="sym">○</span>←左</div>
      <div class="hint-pill hint-x" id="hint-x-btn">右→<span class="sym">×</span></div>
    </div>

    <div class="flash" id="flash"><div class="flash-text" id="flash-text"></div></div>
    <div class="confetti-layer" id="confetti-layer"></div>
    <div class="wrong-flash" id="wrong-flash"></div>

    <div class="countdown-overlay hidden" id="countdown-overlay">
      <div class="countdown-num num" id="countdown-num">3</div>
    </div>
  </div>

  <!-- QUIT CONFIRM -->
  <div class="modal-overlay hidden" id="quit-modal">
    <div class="modal-card confirm-card">
      <div class="confirm-text">ゲームを中断しますか?<br><span class="confirm-sub">ここまでの回答は履歴に残ります</span></div>
      <div class="confirm-actions">
        <button class="confirm-btn ghost" id="quit-cancel">続ける</button>
        <button class="confirm-btn danger" id="quit-confirm">中断する</button>
      </div>
    </div>
  </div>

  <!-- CLEAR HISTORY CONFIRM -->
  <div class="modal-overlay hidden" id="clear-history-modal">
    <div class="modal-card confirm-card">
      <div class="confirm-text">履歴をすべて削除しますか?<br><span class="confirm-sub">この操作は元に戻せません</span></div>
      <div class="confirm-actions">
        <button class="confirm-btn ghost" id="clear-history-cancel">キャンセル</button>
        <button class="confirm-btn danger" id="clear-history-confirm">削除する</button>
      </div>
    </div>
  </div>

  <!-- END -->
  <div id="end-screen" class="screen hidden">
    <div class="result-label" id="result-label">RESULT <span class="interrupted-tag hidden" id="interrupted-tag">中断</span></div>
    <div class="result-score num" id="result-score">0</div>
    <div class="result-sub" id="result-sub">/ 0問中</div>

    <div class="result-stats">
      <div class="stat"><span class="stat-label">正解</span><span class="stat-val ok num" id="stat-correct">0</span></div>
      <div class="stat"><span class="stat-label">不正解</span><span class="stat-val ng num" id="stat-wrong">0</span></div>
      <div class="stat"><span class="stat-label">正解率</span><span class="stat-val num" id="stat-rate">0%</span></div>
    </div>

    <div class="rank-row">
      <div class="rank-card"><div class="rank-label">正確性</div><div class="rank-grade num" id="rank-accuracy">A</div></div>
      <div class="rank-card"><div class="rank-label">スピード</div><div class="rank-grade num" id="rank-speed">A</div></div>
    </div>

    <div class="result-tier" id="result-tier">はじめまして!</div>
    <button class="retry-btn" id="retry-btn">もう一度あそぶ</button>
    <button class="end-history-link" id="end-history-btn">履歴を見る</button>
  </div>

  <!-- HISTORY MODAL -->
  <div class="modal-overlay hidden" id="history-modal">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-header-left">
          <button class="modal-back hidden" id="history-back">←</button>
          <span id="history-title">履歴</span>
        </div>
        <button class="modal-close" id="history-close">×</button>
      </div>
      <div class="modal-list" id="history-list"></div>
    </div>
  </div>

</div>

<script>
const GENRES = ["動物","歴史","食べ物","スポーツ","ことば","雑学","アニメ","映画","音楽"];

const QUESTIONS = [
  // 動物

  {q:"カタツムリは殻を脱いでヤドカリのように引っ越す",a:false,g:"動物",exp:"カタツムリの殻は体の一部で、脱いで引っ越すことはできません。"},
  {q:"キリンの首の骨の数は人間の2倍以上ある",a:false,g:"動物",exp:"キリンの首の骨は人間と同じ7個です。"},

// 文末パターンをもとに、意味が正反対になる自然な言い換えを生成する。
// 対応しない文末(慣用表現など)は無理に変換せず、そのまま単一の問い方として扱う。
const NEGATION_PAIRS = [
  ["されていない","されている"], ["されている","されていない"],
  ["していない","している"],     ["している","していない"],
  ["ことがある","ことはない"],   ["ことはない","ことがある"],
  ["ではない","である"],         ["である","ではない"],
  ["でない","である"],
  ["できない","できる"],         ["できる","できない"],
  ["されない","される"],         ["される","されない"],
  ["られない","られる"],         ["られる","られない"],
  ["われない","われる"],         ["われる","われない"],
  ["ていない","ている"],         ["ている","ていない"],
  ["えない","える"],             ["える","えない"],
  ["いない","いる"],             ["いる","いない"],
].sort((x, y) => y[0].length - x[0].length);

function negate(text){
  for(const [from, to] of NEGATION_PAIRS){
    if(text.endsWith(from)){
      return text.slice(0, -from.length) + to;
    }
  }
  return null;
}

QUESTIONS.forEach(q => { q.neg = negate(q.q); });

// Claude Artifact上ではwindow.storageを、単体のブラウザではlocalStorageを使う。
// どちらも使えない/失敗する場合は保存せず、そのままメモリ上だけで動作する。
async function saveGamesToStorage(games){
  const payload = JSON.stringify(games);
  try {
    if(window.storage && typeof window.storage.set === 'function'){
      const result = await window.storage.set(HISTORY_KEY, payload);
      if(result){ return; }
      // resultがnullの場合は失敗とみなし、下のlocalStorageにフォールバック
    }
  } catch(err){ /* window.storageが使えない環境。localStorageにフォールバック */ }
  try {
    localStorage.setItem(HISTORY_KEY, payload);
  } catch(err){ /* 保存できる場所がない場合は諦める(メモリ上でのみ動作) */ }
}

async function loadGamesFromStorage(){
  try {
    if(window.storage && typeof window.storage.get === 'function'){
      const res = await window.storage.get(HISTORY_KEY);
      if(res && res.value) return JSON.parse(res.value);
    }
  } catch(err){ /* キー未作成 or 利用不可。localStorageにフォールバック */ }
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    if(raw) return JSON.parse(raw);
  } catch(err){ /* 何もできない場合は空で開始 */ }
  return [];
}

// 15秒以下で「注意」色、5秒以下で「危険」演出(点滅+画面縁が赤く光る)に切り替える。
function updateTimerUI(){
  const t = Math.max(timeLeft, 0);
  timerNumN.textContent = t;
  timerFill.style.width = (t / selectedTime * 100) + '%';

  timerNum.classList.remove('warn','danger');
  timerFill.classList.remove('warn','danger');
  dangerVignette.classList.remove('active');

  if(timeLeft <= 5 && timeLeft > 0){
    timerNum.classList.add('danger');
    timerFill.classList.add('danger');
    dangerVignette.classList.add('active');
  } else if(timeLeft <= 15){
    timerNum.classList.add('warn');
    timerFill.classList.add('warn');
  }
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

    countdownNum.classList.toggle('go', steps[i] === 'スタート!');
    countdownNum.classList.remove('pop');
    void countdownNum.offsetWidth; // reflow でアニメーションを再トリガー
    countdownNum.classList.add('pop');

    const d = durations[i];
    i++;
    if(i < steps.length){
      setTimeout(step, d);
    } else {
      setTimeout(()=>{
        countdownOverlay.classList.add('hidden');
        onDone();
      }, d);
    }
  }
  step();
}

function runTimer(){
  clearInterval(timerId);
  timerId = setInterval(()=>{
    timeLeft -= 1;
    updateTimerUI();
    if(timeLeft <= 0){
      clearInterval(timerId);
      endGame();
    }
  },1000);
}

let currentDisplay = { text: '', correct: false };

function loadQuestion(){
  if(qIndex >= queue.length){ queue = shuffle(currentPool); qIndex = 0; }
  const base = queue[qIndex];
  let text = base.q;
  let correct = base.a;
  if(base.neg && Math.random() < 0.5){
    text = base.neg;
    correct = !base.a;
  }
  currentDisplay = { text, correct, exp: base.exp || '' };
  qtext.textContent = text;
  qnum.textContent = 'Q'+(answered+1);
  card.style.transition = 'none';
  card.style.transform = 'translate(0px,0px) rotate(0deg)';
  card.style.opacity = '1';
  requestAnimationFrame(()=>{ card.style.transition = ''; alignZoneSymbols(); });
  locked = false;
  questionShownAt = performance.now();
}

const RANK_NAMES = ['D','C','B','A','S','SS','SSS','EX','MASTER','LEGEND'];

// 正答率(0〜1)を0〜9の段階インデックスに変換
// ○×クイズは何も考えず答えても正答率50%前後になりうるため、
// 50%付近は下位ランクにとどまるよう厳しめに設定している
function accuracyIndex(rate, answered){
  const th = [0.50, 0.58, 0.65, 0.72, 0.78, 0.84, 0.89, 0.93, 0.97];
  let idx = th.length;
  for(let i = 0; i < th.length; i++){ if(rate < th[i]){ idx = i; break; } }
  idx = capByReliability(idx, answered);
  return idx;
}

// 平均回答時間(秒・小さいほど速い)を0〜9の段階インデックスに変換
function speedIndex(avgSec, answered){
  // 平均回答時間(秒)が短いほど上位。値が大きい(遅い)方から順に判定する
  const th = [4.0, 3.3, 2.8, 2.4, 2.1, 1.8, 1.5, 1.2, 0.95];
  let idx = th.length;
  for(let i = 0; i < th.length; i++){ if(avgSec >= th[i]){ idx = i; break; } }
  idx = capByReliability(idx, answered);
  return idx;
}

// 回答数が少ないと「たまたま」上位ランクが出やすくなってしまうため、
// 信頼できるだけの問題数をこなしていない場合はランクに上限をかける
function capByReliability(idx, answered){
  if(answered === undefined || answered === null) return idx;
  if(answered < 3) return Math.min(idx, 3);  // Aまで
  if(answered < 6) return Math.min(idx, 5);  // SSまで
  if(answered < 10) return Math.min(idx, 7); // EXまで
  return idx;
}

function rankFromIndex(idx){ return RANK_NAMES[Math.max(0, Math.min(9, idx))]; }

const LEVEL_COMMENTS = [
  'まだ伸びしろが大きい段階。基本から慣れていこう',
  '少しずつ勘所をつかんできたところ',
  '平均的なレベル。ここからが本番',
  '及第点の実力。安定感を磨いていこう',
  '実力者と呼べるレベルに到達',
  'かなりの実力。上位クラスの結果',
  '相当な精度とスピード。簡単には出せない結果',
  '達人レベル。ミスも迷いもほぼない',
  '文句なしの高精度。トップクラスの実力',
  '別次元の結果。文字通り伝説級'
];

// 総合評価は「正確性を最優先し、正確性が伴っている場合にのみスピードを加味する」方式にしている。
// タイピング検定などと同じ考え方で、どれだけ速く答えても正答率が低ければ
// 「たまたま当たっただけ」の可能性があるため高評価にはしない。
function overallComment(accIdx, spdIdx){
  let overall;
  if(accIdx <= 1){
    // 正答率がD/C相当(低い)場合は、スピードにかかわらず正確性の低さをそのまま反映する
    overall = accIdx;
  } else if(accIdx <= 3){
    // B/A相当。スピードが飛び抜けて速い(EX以上)場合のみ+1のボーナス程度にとどめる
    overall = Math.min(9, accIdx + (spdIdx >= 7 ? 1 : 0));
  } else {
    // S相当以上まで正確性が伴っていれば、スピードも本人の実力として評価に反映する
    overall = Math.round(accIdx * 0.75 + spdIdx * 0.25);
  }
  overall = Math.max(0, Math.min(9, overall));

  let style;
  if(accIdx <= 1 && spdIdx >= 5){
    style = '正解を急ぎすぎているかも。まずは正確性を優先しよう';
  } else if(spdIdx - accIdx >= 4){
    style = 'スピード重視の早押しタイプ(正確性が伴うとさらに良い)';
  } else if(accIdx - spdIdx >= 3){
    style = '正確さ重視のじっくり派タイプ';
  } else {
    style = '正確さとスピードのバランス型';
  }
  return LEVEL_COMMENTS[overall] + `(${style})`;
}

function setGrade(id, grade){
  const el = document.getElementById(id);
  if(grade === null || grade === undefined){
    el.textContent = '―';
    el.className = 'rank-grade num grade-none';
    return;
  }
  el.textContent = grade;
  el.className = 'rank-grade num grade-' + grade;
}

function endGame(interrupted){
  interrupted = !!interrupted;
  clearInterval(timerId);
  gameScreen.classList.add('hidden');
  const wrong = answered - score;
  const rate = answered > 0 ? score / answered : 0;
  const avgResponseSec = answered > 0 ? (totalResponseMs / answered) / 1000 : 0;

  document.getElementById('result-score').textContent = score;
  document.getElementById('result-sub').textContent = '/ '+answered+'問中('+genreLabel(selectedGenre)+')';
  document.getElementById('stat-correct').textContent = score;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-rate').textContent = Math.round(rate*100)+'%';

  const accIdx = accuracyIndex(rate, answered);
  const spdIdx = speedIndex(avgResponseSec, answered);
  if(interrupted){
    setGrade('rank-accuracy', null);
    setGrade('rank-speed', null);
  } else {
    setGrade('rank-accuracy', rankFromIndex(accIdx));
    setGrade('rank-speed', rankFromIndex(spdIdx));
  }

  interruptedTag.classList.toggle('hidden', !interrupted);

  const tierEl = document.getElementById('result-tier');
  let tier = 'はじめまして!';
  if(interrupted) tier = '途中で中断したため、今回は評価なしです';
  else if(answered > 0) tier = overallComment(accIdx, spdIdx);
  tierEl.textContent = tier;
  endScreen.classList.remove('hidden');

  if(answered > 0){
    allGames.unshift({
      date: new Date(),
      selectedTime: selectedTime,
      genre: selectedGenre,
      score: score,
      answered: answered,
      wrong: wrong,
      rate: rate,
      avgResponseSec: avgResponseSec,
      interrupted: interrupted,
      entries: currentGameLog.slice()
    });
    if(allGames.length > 10) allGames.length = 10;
    saveGamesToStorage(allGames);
  }
}

const CONFETTI_COLORS = ['#17a974','#ffcb4d','#e14a56','#5eebb0','#ff9aa2','#cc7a00','#4d9eff','#b06bff'];

function spawnConfetti(){
  const count = 44;
  for(let i = 0; i < count; i++){
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const angle = Math.random() * Math.PI * 2;
    const dist = 110 + Math.random() * 260;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 50; // 少し上向きに散らす
    el.style.setProperty('--dx', dx.toFixed(1) + 'px');
    el.style.setProperty('--dy', dy.toFixed(1) + 'px');
    el.style.setProperty('--rot', (Math.random() * 720 - 360).toFixed(0) + 'deg');
    el.style.background = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
    const isStreamer = Math.random() < 0.35;
    if(isStreamer){
      el.style.width = (10 + Math.random() * 8).toFixed(1) + 'px';
      el.style.height = (4 + Math.random() * 3).toFixed(1) + 'px';
      el.style.borderRadius = '2px';
    } else {
      const size = (7 + Math.random() * 8).toFixed(1) + 'px';
      el.style.width = size;
      el.style.height = size;
      el.style.borderRadius = Math.random() < 0.5 ? '50%' : '2px';
    }
    el.style.animationDelay = (Math.random() * 0.08).toFixed(2) + 's';
    confettiLayer.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

function spawnWrongEffect(){
  wrongFlash.classList.remove('active');
  // reflow を挟んでアニメーションを再トリガー
  void wrongFlash.offsetWidth;
  wrongFlash.classList.add('active');

  cardWrap.classList.remove('shake');
  void cardWrap.offsetWidth;
  cardWrap.classList.add('shake');
}

function answer(isLeft){
  if(locked) return;
  locked = true;
  let scheduledNext = false;

  try {
    const cur = currentDisplay;
    const userAnswer = isLeft; // left = true(○), right = false(×)
    const correct = (userAnswer === cur.correct);

    const elapsedMs = Math.max(0, Math.min(20000, performance.now() - questionShownAt));
    totalResponseMs += elapsedMs;

    if(correct) score++;
    answered++;
    scoreNum.textContent = score;

    currentGameLog.push({num: answered, q: cur.text, userO: userAnswer, correctO: cur.correct, correct: correct, exp: cur.exp});

    if(correct){
      try { spawnConfetti(); } catch(err){ console.error('confetti failed', err); }
    } else {
      try { spawnWrongEffect(); } catch(err){ console.error('wrong effect failed', err); }
    }

    // fly card off
    const flyX = isLeft ? -700 : 700;
    card.style.transition = 'transform .35s cubic-bezier(.2,.8,.3,1), opacity .35s ease';
    card.style.transform = `translate(${flyX}px, 0px) rotate(${isLeft?-18:18}deg)`;
    card.style.opacity = '0';

    // flash feedback
    flashText.textContent = correct ? 'せいかい!' : 'ざんねん…';
    flashText.className = 'flash-text ' + (correct ? 'correct' : 'wrong');
    flash.style.transition = 'opacity .12s ease';
    flash.style.opacity = '1';
    setTimeout(()=>{ flash.style.opacity = '0'; }, 260);

    setTimeout(()=>{
      qIndex++;
      if(timeLeft > 0) loadQuestion();
    }, 300);
    scheduledNext = true;
  } catch(err){
    console.error('answer() failed', err);
  } finally {
    // 万が一エラーが起きて次の問題へ進む処理がスケジュールされなかった場合の保険
    if(!scheduledNext){
      card.style.transition = 'transform .25s ease';
      card.style.transform = 'translate(0px,0px) rotate(0deg)';
      card.style.opacity = '1';
      setTimeout(()=>{
        qIndex++;
        if(timeLeft > 0) loadQuestion();
      }, 300);
    }
  }
}

// drag / flick handling
let dragging = false;
let startX=0, startY=0;

card.addEventListener('pointerdown', (e)=>{
  if(locked) return;
  dragging = true;
  card.classList.add('dragging');
  startX = e.clientX; startY = e.clientY;
  card.style.transition = 'none';
});

window.addEventListener('pointermove', (e)=>{
  if(!dragging) return;
  const dx = e.clientX - startX;
  const dy = e.clientY - startY;
  card.style.transform = `translate(${dx}px, ${dy*0.4}px) rotate(${dx*0.04}deg)`;

  const leftStrength = Math.max(0, Math.min(1, -dx/160));
  const rightStrength = Math.max(0, Math.min(1, dx/160));
  zoneLeft.style.backgroundColor = `rgba(61,220,151,${leftStrength*0.25})`;
  zoneRight.style.backgroundColor = `rgba(255,107,122,${rightStrength*0.25})`;
});

function resetZones(){
  zoneLeft.style.backgroundColor = 'transparent';
  zoneRight.style.backgroundColor = 'transparent';
}

function finishDrag(e){
  if(!dragging) return;
  dragging = false;
  card.classList.remove('dragging');
  resetZones();
  const dx = e.clientX - startX;
  const dy = e.clientY - startY;
  const threshold = 90;

  if(Math.abs(dx) > threshold && Math.abs(dx) > Math.abs(dy)){
    answer(dx < 0);
  } else {
    card.style.transition = 'transform .25s cubic-bezier(.3,.6,.3,1)';
    card.style.transform = 'translate(0px,0px) rotate(0deg)';
  }
}

window.addEventListener('pointerup', finishDrag);
window.addEventListener('pointercancel', ()=>{
  if(!dragging) return;
  dragging = false;
  card.classList.remove('dragging');
  resetZones();
  card.style.transition = 'transform .25s ease';
  card.style.transform = 'translate(0px,0px) rotate(0deg)';
});

// keyboard accessibility
document.addEventListener('keydown', (e)=>{
  if(gameScreen.classList.contains('hidden')) return;
  if(e.key === 'ArrowLeft'){ answer(true); }
  if(e.key === 'ArrowRight'){ answer(false); }
});

// tap the ○/× guide pills to answer directly
hintOBtn.addEventListener('click', ()=>{ answer(true); });
hintXBtn.addEventListener('click', ()=>{ answer(false); });

// quit / interrupt game
quitBtn.addEventListener('click', ()=>{
  clearInterval(timerId);
  showModalOverlay(quitModal);
});
quitCancel.addEventListener('click', ()=>{
  hideModalOverlay(quitModal);
  if(!gameScreen.classList.contains('hidden') && timeLeft > 0){
    runTimer();
  }
});
quitConfirmBtn.addEventListener('click', ()=>{
  hideModalOverlay(quitModal);
  endGame(true);
});
quitModal.addEventListener('click', (e)=>{
  if(e.target === quitModal){
    hideModalOverlay(quitModal);
    if(!gameScreen.classList.contains('hidden') && timeLeft > 0){
      runTimer();
    }
  }
});

// exit app removed (window.close() cannot reliably close a normally-opened tab)

// clear history
document.getElementById('clear-history-cancel').addEventListener('click', ()=>{
  hideModalOverlay(clearHistoryModal);
});
document.getElementById('clear-history-confirm').addEventListener('click', ()=>{
  allGames = [];
  saveGamesToStorage(allGames);
  hideModalOverlay(clearHistoryModal);
  renderGamesList();
});
clearHistoryModal.addEventListener('click', (e)=>{
  if(e.target === clearHistoryModal){
    hideModalOverlay(clearHistoryModal);
  }
});

// history modal
function formatDate(d){
  const mm = d.getMonth()+1, dd = d.getDate();
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return `${mm}/${dd} ${hh}:${mi}`;
}

function renderGamesList(){
  historyTitle.textContent = '履歴(直近10ゲーム)';
  historyBack.classList.add('hidden');
  if(allGames.length === 0){
    historyList.innerHTML = '<div class="modal-empty">まだプレイ記録がありません</div>';
    return;
  }
  historyList.innerHTML = allGames.map((game, idx) => {
    const accGrade = game.interrupted ? null : rankFromIndex(accuracyIndex(game.rate, game.answered));
    const spdGrade = game.interrupted ? null : rankFromIndex(speedIndex(game.avgResponseSec, game.answered));
    const gradesHtml = game.interrupted
      ? `<span class="g-grade grade-none">中断のため評価なし</span>`
      : `<span class="g-grade grade-${accGrade}">正確性 ${accGrade}</span>
         <span class="g-grade grade-${spdGrade}">スピード ${spdGrade}</span>`;
    return `
    <button class="g-item" data-idx="${idx}">
      <div class="g-item-left">
        <div class="g-item-score num">正解 ${game.score} / ${game.answered}問</div>
        <div class="g-item-date">${formatDate(game.date)}・${genreLabel(game.genre)}(制限時間${game.selectedTime}秒)${game.interrupted ? '<span class="g-interrupted">中断</span>' : ''}</div>
        <div class="g-item-grades">
          ${gradesHtml}
        </div>
      </div>
      <div class="g-item-right">
        <div class="g-item-rate num">${Math.round(game.rate*100)}%</div>
        <div class="g-item-arrow">›</div>
      </div>
    </button>
  `;
  }).join('') + `<button class="clear-history-btn" id="clear-history-btn">履歴をすべて削除</button>`;

  historyList.querySelectorAll('.g-item').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const idx = parseInt(btn.dataset.idx, 10);
      renderGameDetail(allGames[idx], true);
    });
  });

  const clearBtn = document.getElementById('clear-history-btn');
  if(clearBtn){
    clearBtn.addEventListener('click', ()=>{
      showModalOverlay(clearHistoryModal);
    });
  }
}

function renderGameDetail(game, fromList){
  historyTitle.textContent = fromList
    ? `${formatDate(game.date)}の記録${game.interrupted ? '(中断)' : ''}`
    : '今のゲームの記録';
  historyBack.classList.toggle('hidden', !fromList);

  if(game.entries.length === 0){
    historyList.innerHTML = '<div class="modal-empty">まだ回答していません</div>';
    return;
  }
  historyList.innerHTML = game.entries.map(item => `
    <div class="h-item">
      <div class="h-num num">Q${item.num}</div>
      <div>
        <div class="h-q">${item.q}</div>
        ${item.correct ? '' : `
          <div class="h-correct-note">正解は「${item.correctO ? '○' : '×'}」</div>
          ${item.exp ? `<div class="h-exp">💡 ${item.exp}</div>` : ''}
        `}
      </div>
      <div class="h-mark ${item.correct ? 'ok' : 'ng'}">${item.userO ? '○' : '×'}</div>
    </div>
  `).join('');
}

function openModal(){
  showModalOverlay(historyModal);
  if(!gameScreen.classList.contains('hidden')){
    clearInterval(timerId);
  }
}

function closeHistory(){
  hideModalOverlay(historyModal);
  if(!gameScreen.classList.contains('hidden') && timeLeft > 0){
    runTimer();
  }
}

function openCurrentGameHistory(){
  const pseudoGame = {entries: currentGameLog};
  renderGameDetail(pseudoGame, false);
  openModal();
}

function openGamesHistory(){
  renderGamesList();
  openModal();
}

historyBtn.addEventListener('click', openCurrentGameHistory);
endHistoryBtn.addEventListener('click', openGamesHistory);
historyBack.addEventListener('click', renderGamesList);
historyClose.addEventListener('click', closeHistory);
historyModal.addEventListener('click', (e)=>{
  if(e.target === historyModal) closeHistory();
});
</script>
